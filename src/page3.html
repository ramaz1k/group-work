<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>

    <section class="bg-[#666666] py-[50px] px-[20px] text-white">
        <header class="flex gap-[30px] items-center max-w-[1200px] m-auto justify-between">
            <div>
                <img src="./images/Logo.png" alt="">
            </div>
            <button class="p-[15px] border border-white gap-[200px] rounded-2xl text-[14px] font-[250] text-white hidden lg:flex">Search bar
                <div>
                    <img src="./images/Search.png" alt="">
                </div>
            </button>
            <div class="hidden lg:flex gap-[20px]">
                <p class="font-bold">Category</p>
                <p class="font-[600]">Become an Mentor</p>
            </div>
            <div class="flex gap-[10px]">
                <button class="border border-white py-[10px] px-[20px] rounded-[10px] hidden lg:block">Login</button>
                <button class="bg-[#F72585] py-[10px] px-[35px] rounded-[10px]">Sign Up</button>
            </div>
        </header>
        <section class="my-[50px] flex flex-col gap-[35px] max-w-[1200px] m-auto">
           <p class="text-2xl font-bold lg:text-5xl">How to become an Expert Web Developer</p>
           <div class="flex gap-[20px] items-center">
             <div>
                <img src="./images/Rating.png" alt="">
             </div>
             <p class="font-bold text-[18px] lg:text-2xl">4,7/5</p>
             <p class="text-[#E5E5E5] text-[10px] lg:text-[14px]">(1023 Reviews)</p>
             <p class="text-[#E5E5E5] text-[10px] lg:text-[14px]">20327 Student</p>
           </div>
           <div class=" flex gap-[20px] items-center">
            <div class="h-[50px] w-[50px] bg-[#AAAAAA] rounded-[50%]"></div>
            <p class="text-[20px] font-bold lg:text-2xl">Pak Arif Satria Kecek ulalala</p>
           </div>
           <div class=" flex gap-[20px]">
            <button class="flex gap-[12px] bg-[#F72585] font-bold py-[10px] px-[30px] rounded-[10px] h-[55px]">
                <p>Add To Wishlist <span class="text-[20px]">+</span></p>
            </button>
            <button class="text-[#F72585] bg-white py-[10px] px-[25px] flex gap-[12px] h-[52px] items-center rounded-[10px] font-bold">Share
                <div><img src="./images/share.png" alt=""></div>
            </button>
           </div>
        </section>
    </section>
    
</body>
</html>
